name: Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vigilops
          POSTGRES_PASSWORD: vigilops_dev_password
          POSTGRES_DB: vigilops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vigilops"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio aiosqlite pytest-timeout

      - name: Run tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_USER: vigilops
          POSTGRES_PASSWORD: vigilops_dev_password
          POSTGRES_DB: vigilops
          REDIS_HOST: localhost
          AI_API_KEY: test-key-for-ci
          MEMORY_ENABLED: "false"
          SECRET_KEY: test-secret-key-for-ci
          ENVIRONMENT: test
          AGENT_TOKEN_HMAC_KEY: test-hmac-key-for-ci
        run: |
          cd backend
          python -c "
          import asyncio
          from app.core.database import engine, Base
          # Import all models so Base.metadata knows about them
          from app.models import *  # noqa
          async def init():
              async with engine.begin() as conn:
                  await conn.run_sync(Base.metadata.create_all)
          asyncio.run(init())
          print('PostgreSQL tables created via metadata.create_all')
          "
          python -m pytest tests/ -x --tb=short -q --timeout=60

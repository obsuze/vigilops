apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vigilops.secretName" . }}
  labels:
    {{- include "vigilops.labels" . | nindent 4 }}
type: Opaque
data:
  # PostgreSQL password / 数据库密码
  {{- if .Values.postgresql.enabled }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.auth.password | b64enc | quote }}
  {{- else }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.external.password | b64enc | quote }}
  {{- end }}
  # Redis password / Redis 密码
  {{- if .Values.redis.enabled }}
  REDIS_PASSWORD: {{ .Values.redis.auth.password | b64enc | quote }}
  {{- else }}
  REDIS_PASSWORD: {{ .Values.redis.external.password | b64enc | quote }}
  {{- end }}
  # JWT secret key / JWT 签名密钥
  JWT_SECRET_KEY: {{ .Values.jwt.secretKey | b64enc | quote }}
  # AI API key / AI 服务密钥
  {{- if .Values.ai.apiKey }}
  AI_API_KEY: {{ .Values.ai.apiKey | b64enc | quote }}
  {{- else }}
  AI_API_KEY: {{ "" | b64enc | quote }}
  {{- end }}
  # MCP authentication token / MCP 认证令牌
  {{- if .Values.mcpAuth.token }}
  VIGILOPS_MCP_TOKEN: {{ .Values.mcpAuth.token | b64enc | quote }}
  {{- else }}
  VIGILOPS_MCP_TOKEN: {{ "" | b64enc | quote }}
  {{- end }}

{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vigilops.fullname" . }}-redis
  labels:
    {{- include "vigilops.redis.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "vigilops.redis.selectorLabels" . | nindent 6 }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "vigilops.redis.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - {{ .Values.redis.maxmemory | quote }}
            - --maxmemory-policy
            - {{ .Values.redis.maxmemoryPolicy | quote }}
            {{- if .Values.redis.auth.password }}
            - --requirepass
            - $(REDIS_PASSWORD)
            {{- end }}
          ports:
            - name: tcp-redis
              containerPort: 6379
              protocol: TCP
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "vigilops.secretName" . }}
                  key: REDIS_PASSWORD
            - name: TZ
              value: {{ .Values.timezone | quote }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                {{- if .Values.redis.auth.password }}
                - redis-cli -a "$REDIS_PASSWORD" ping | grep -q PONG
                {{- else }}
                - redis-cli ping | grep -q PONG
                {{- end }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                {{- if .Values.redis.auth.password }}
                - redis-cli -a "$REDIS_PASSWORD" ping | grep -q PONG
                {{- else }}
                - redis-cli ping | grep -q PONG
                {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 5
          {{- with .Values.redis.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        {{- if .Values.redis.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "vigilops.fullname" . }}-redis
        {{- else }}
        - name: data
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
{{- if .Values.redis.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "vigilops.fullname" . }}-redis
  labels:
    {{- include "vigilops.redis.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.redis.persistence.accessModes | nindent 4 }}
  {{- if .Values.redis.persistence.storageClass }}
  storageClassName: {{ .Values.redis.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.redis.persistence.size | quote }}
{{- end }}
{{- end }}
